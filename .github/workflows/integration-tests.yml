name: Integration Tests (Xcode)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *' # nightly at 03:00 UTC

jobs:
  xcode-integration-tests:
    name: Integration tests (build-for-testing + test-without-building)
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print environment
        run: |
          sw_vers
          swift --version || true
          xcodebuild -version

      - name: Select available simulator
        id: sim
        run: |
          set -euo pipefail
          # prefer newer device names, fall back to common names
          PREFERRED=("iPhone 17" "iPhone 17 Pro" "iPhone 14" "iPhone 13")
          AVAILABLE=$(xcrun simctl list devices available | sed -n '1,200p')
          echo "Available devices:" >&2
          echo "$AVAILABLE" >&2
          SELECTED=""
          for name in "${PREFERRED[@]}"; do
            udid=$(xcrun simctl list devices available | grep -m1 "${name} (" | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/') || true
            if [ -n "$udid" ]; then
              SELECTED_NAME="$name"
              SELECTED="$udid"
              break
            fi
          done
          if [ -z "$SELECTED" ]; then
            # fallback to first iPhone simulator
            SELECTED=$(xcrun simctl list devices available | grep -m1 'iPhone' | sed -E 's/.*\(([0-9A-F-]+)\).*/\1/')
            SELECTED_NAME=$(xcrun simctl list devices available | grep -m1 'iPhone' | sed -E 's/(.*) \(.*/\1/')
          fi
          if [ -z "$SELECTED" ]; then
            echo "No available iPhone simulator found on runner; aborting." >&2
            exit 1
          fi
          echo "selected_udid=$SELECTED" >> $GITHUB_OUTPUT
          echo "selected_name=$SELECTED_NAME" >> $GITHUB_OUTPUT
          echo "Selected simulator: $SELECTED_NAME ($SELECTED)"

      - name: Boot simulator
        run: |
          set -euo pipefail
          UDID=${{ steps.sim.outputs.selected_udid }}
          xcrun simctl boot "$UDID" || true
          # Wait for simulator to be ready
          i=0
          until xcrun simctl spawn "$UDID" launchctl print system >/dev/null 2>&1 || [ $i -ge 30 ]; do
            echo "Waiting for simulator to boot... ($i)"
            sleep 2
            i=$((i+1))
          done
          xcrun simctl list devices | sed -n '1,200p'

      - name: Build for testing (create .xctestrun)
        env:
          DERIVED_DATA: ${{ github.workspace }}/build
        run: |
          set -euo pipefail
          UDID=${{ steps.sim.outputs.selected_udid }}
          echo "Derived data: $DERIVED_DATA"
          # Clean previous derived data location
          rm -rf "$DERIVED_DATA" || true
          mkdir -p "$DERIVED_DATA"
          xcodebuild -project EYEVO.xcodeproj -scheme EYEVO -sdk iphonesimulator -derivedDataPath "$DERIVED_DATA" -destination "id=$UDID" build-for-testing | tee build-for-testing.log
          # locate xctestrun file
          XCTESTRUN=$(ls "$DERIVED_DATA"/Build/Products/*.xctestrun 2>/dev/null || true)
          if [ -z "$XCTESTRUN" ]; then
            echo "No .xctestrun found in $DERIVED_DATA/Build/Products" >&2
            ls -la "$DERIVED_DATA" || true
            exit 1
          fi
          echo "xctestrun=$XCTESTRUN" >> $GITHUB_OUTPUT
          echo "Built .xctestrun: $XCTESTRUN"

      - name: Run tests without building
        run: |
          set -euo pipefail
          UDID=${{ steps.sim.outputs.selected_udid }}
          XCTESTRUN=${{ steps.sim.outputs.xctestrun || '' }}
          # fallback to computed artifact
          if [ -z "$XCTESTRUN" ]; then
            XCTESTRUN=$(ls build/Build/Products/*.xctestrun 2>/dev/null || true)
          fi
          if [ -z "$XCTESTRUN" ]; then
            echo "No xctestrun provided/found; aborting" >&2
            exit 1
          fi
          echo "Running tests using: $XCTESTRUN on device $UDID"
          xcodebuild test-without-building -xctestrun "$XCTESTRUN" -destination "id=$UDID" | tee xcode-test.log

      - name: Shutdown simulator
        if: always()
        run: |
          UDID=${{ steps.sim.outputs.selected_udid }}
          xcrun simctl shutdown "$UDID" || true

      - name: Upload logs (if available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-integration-logs
          path: |
            build-for-testing.log
            xcode-test.log
            build/Build/Products/*.xctestrun
